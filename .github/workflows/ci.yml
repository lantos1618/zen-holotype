name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Build zenc
        run: make -f bootstrap/Makefile zenc

      - name: Tests
        run: pytest -q

      - name: Regenerate bootstrap C
        run: |
          make -f bootstrap/Makefile regen
          if ! git diff --quiet -- bootstrap/zenc.gen.c; then
            echo "::error::bootstrap/zenc.gen.c is stale - run 'make -f bootstrap/Makefile regen' and commit"
            git diff -- bootstrap/zenc.gen.c
            exit 1
          fi
