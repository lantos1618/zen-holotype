name: Release

# Push a tag like `v0.1.0` to cut a release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Build zenc
        run: make -f bootstrap/Makefile zenc

      - name: Tests
        run: pytest -q

      - name: Regenerate bootstrap C
        run: |
          make -f bootstrap/Makefile regen
          if ! git diff --quiet -- bootstrap/zenc.gen.c; then
            echo "::error::bootstrap/zenc.gen.c is stale - run 'make -f bootstrap/Makefile regen' and commit"
            git diff -- bootstrap/zenc.gen.c
            exit 1
          fi

      - name: Package source + bootstrap artifacts
        run: |
          mkdir -p dist
          cp zenc dist/zenc
          tar czf dist/zen-${{ github.ref_name }}-src.tar.gz \
            README.md ARCHITECTURE.md CHANGELOG.md FEATURES.md VISION.md \
            bootstrap zen examples tools tests \
            pytest.ini requirements.txt requirements-dev.txt

      - name: Release dry-run
        run: |
          rm -rf /tmp/relcheck && mkdir -p /tmp/relcheck
          tar xzf dist/zen-${{ github.ref_name }}-src.tar.gz -C /tmp/relcheck
          cd /tmp/relcheck
          pip install -r requirements-dev.txt
          make -f bootstrap/Makefile zenc
          pytest -q
          cp bootstrap/zenc.gen.c /tmp/zenc.gen.c.before
          make -f bootstrap/Makefile regen
          cmp -s /tmp/zenc.gen.c.before bootstrap/zenc.gen.c

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zen-${{ github.ref_name }}-src.tar.gz
            dist/zenc
