name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest          # provides cc — needed to build the tree-sitter parser
    steps:                          # (zen.so) and to compile the codegen test programs
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Type-check (mypy)
        run: python -m mypy zen

      - name: Tests (pytest)
        run: python -m pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Smoke build (zen build examples -> "vecdemo -> 12")
        run: |
          python -m zen build examples | tee build.log
          grep -q "vecdemo -> 12" build.log
        env:
          PYTHONPATH: ${{ github.workspace }}
